  <body>

    <noscript>
      <div style="max-width:800px;margin:0 auto;padding:2rem;font-family:sans-serif;color:#e2e8f0;background:#0f172a;min-height:100vh;">
        <h1 style="font-size:1.8rem;margin-bottom:1rem;color:#f59e0b;">ロト アナライザー — AI予測 × 統計分析 × 運勢占い</h1>
        <p style="margin-bottom:1.5rem;line-height:1.8;">ロト6・ロト7・ミニロトの過去の抽選結果をAIが統計分析し、次回の当選番号を予測する無料Webアプリです。</p>
        <h2 style="font-size:1.3rem;margin-bottom:0.8rem;color:#f59e0b;">主な機能</h2>
        <ul style="line-height:2;margin-bottom:1.5rem;">
          <li><strong>ダッシュボード</strong> — 最新の抽選結果、出現頻度チャート、ホット／コールドナンバー、次回抽選までのカウントダウン</li>
          <li><strong>統計分析</strong> — 出現頻度、出現間隔（ギャップ）、ペア分析、合計値分布、トレンド分析の5種類</li>
          <li><strong>AI予測</strong> — 統計ベース予測、LSTM（深層学習）予測、アンサンブル予測の3つの手法</li>
          <li><strong>抽選履歴</strong> — 過去の全抽選結果をページネーション付きで閲覧・検索</li>
        </ul>
        <h2 style="font-size:1.3rem;margin-bottom:0.8rem;color:#f59e0b;">対応ゲーム</h2>
        <ul style="line-height:2;margin-bottom:1.5rem;">
          <li><strong>ロト6</strong> — 1〜43から6個を選択（毎週木曜抽選）</li>
          <li><strong>ロト7</strong> — 1〜37から7個を選択（毎週金曜抽選）</li>
          <li><strong>ミニロト</strong> — 1〜31から5個を選択（毎週火曜抽選）</li>
        </ul>
        <h2 style="font-size:1.3rem;margin-bottom:0.8rem;color:#f59e0b;">技術について</h2>
        <p style="line-height:1.8;margin-bottom:1.5rem;">TensorFlow.jsによるLSTM（長短期記憶）モデルをブラウザ内で動作させ、過去の抽選パターンから次回の番号を予測します。すべての処理はお使いのブラウザ上で完結するため、データが外部に送信されることはありません。</p>
